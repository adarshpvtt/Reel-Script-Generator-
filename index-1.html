<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Script Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --text: #e8e8f0;
    --muted: #8888aa;
    --green: #3dffa0;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .wrapper { max-width: 780px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 2.5rem; }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.3rem 0.8rem;
    border-radius: 100px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.6rem;
  }

  .sub { color: var(--muted); font-size: 0.95rem; }

  .api-card {
    background: #1a1a10;
    border: 1px solid #3d3d1a;
    border-radius: 16px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .api-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: #cccc44;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .api-input-wrap { flex: 1; min-width: 200px; position: relative; }

  .api-input-wrap input {
    width: 100%;
    background: #12120a;
    border: 1px solid #3d3d1a;
    border-radius: 10px;
    padding: 0.65rem 2.5rem 0.65rem 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
  }

  .api-input-wrap input:focus { border-color: #aaaa22; }

  .toggle-eye {
    position: absolute;
    right: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1rem;
    padding: 0;
  }

  .api-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .api-hint a { color: #aaaa44; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 2rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    margin-bottom: 1.2rem;
  }

  @media (max-width: 540px) { .form-row { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 0.5rem; }

  label {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, select, textarea {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--card); }
  textarea { resize: vertical; min-height: 70px; }

  .generate-btn {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #output { display: none; }

  .section-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 1.2rem;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 1rem 1.4rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }

  .section-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .section-title { font-weight: 700; font-size: 0.95rem; flex: 1; }

  .timing-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--border);
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
  }

  .section-body { padding: 1.4rem; }

  .script-line {
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 1rem;
    color: #fff;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }

  @media (max-width: 500px) { .meta-grid { grid-template-columns: 1fr; } }

  .meta-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
  }

  .meta-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .meta-value { font-size: 0.88rem; color: var(--text); line-height: 1.4; }

  .copy-bar { display: flex; gap: 0.8rem; margin-top: 1.5rem; }

  .copy-btn {
    flex: 1;
    padding: 0.8rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .loader {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #2d1a1a;
    border: 1px solid #5d2020;
    color: #ff8080;
    padding: 1rem 1.2rem;
    border-radius: 10px;
    font-size: 0.9rem;
    margin-top: 1rem;
  }

  .hook .section-icon { background: #2d1f5e; }
  .problem .section-icon { background: #3d1f1f; }
  .value .section-icon { background: #1f3d2a; }
  .cta .section-icon { background: #3d2d1a; }

  .hook .section-header { border-bottom-color: #3d2f7e; }
  .problem .section-header { border-bottom-color: #5d2f2f; }
  .value .section-header { border-bottom-color: #2f5d3a; }
  .cta .section-header { border-bottom-color: #5d4a2a; }

  .value-points { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1rem; }

  .value-point {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
  }

  .vp-num {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
    margin-top: 1px;
  }

  .vp-text { font-size: 0.92rem; line-height: 1.5; }

  .key-saved {
    font-size: 0.75rem;
    color: var(--green);
    margin-top: 0.3rem;
    display: none;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="badge">⚡ AI Script Generator</div>
    <h1>Instagram Reel<br>Script Builder</h1>
    <p class="sub">Powered by Google Gemini — get a viral-ready 30–45 sec script</p>
  </header>

  <!-- API Key Box -->
  <div class="api-card">
    <div>
      <div class="api-label">🔑 Gemini API Key</div>
      <div class="api-hint">Free key from <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> — stored only in your browser</div>
    </div>
    <div class="api-input-wrap">
      <input type="password" id="apiKey" placeholder="Paste your AIza... key here" oninput="saveKey()" />
      <button class="toggle-eye" onclick="toggleKey()" title="Show/hide key">👁</button>
      <div class="key-saved" id="keySaved">✅ Key saved</div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-row">
      <div class="field">
        <label>Topic / Niche</label>
        <input type="text" id="topic" placeholder="e.g. time management for students" />
      </div>
      <div class="field">
        <label>Target Audience</label>
        <select id="audience">
          <option value="students">🎓 Students</option>
          <option value="content creators">🎬 Content Creators</option>
          <option value="developers">💻 Developers</option>
          <option value="entrepreneurs">🚀 Entrepreneurs</option>
          <option value="fitness enthusiasts">💪 Fitness Enthusiasts</option>
          <option value="freelancers">🧑‍💻 Freelancers</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Tone</label>
        <select id="tone">
          <option value="engaging and slightly dramatic">Dramatic & Engaging</option>
          <option value="motivational and energetic">Motivational & Energetic</option>
          <option value="calm and educational">Calm & Educational</option>
          <option value="witty and humorous">Witty & Humorous</option>
          <option value="bold and direct">Bold & Direct</option>
        </select>
      </div>
      <div class="field">
        <label>Call-to-Action Goal</label>
        <select id="cta">
          <option value="follow for more tips">Follow for More</option>
          <option value="save this for later">Save This Post</option>
          <option value="share with a friend who needs this">Share With a Friend</option>
          <option value="comment your answer below">Comment Below</option>
          <option value="visit the link in bio">Link in Bio</option>
        </select>
      </div>
    </div>
    <div class="field" style="margin-bottom:1.2rem">
      <label>Extra Context (optional)</label>
      <textarea id="context" placeholder="Any specific angle, product, tip, or hook you want included..."></textarea>
    </div>
    <button class="generate-btn" id="genBtn" onclick="generateScript()">
      <span>✨</span> Generate Script
    </button>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
  </div>

  <div id="output"></div>
</div>

<script>
// Load saved key on page load
window.addEventListener('load', () => {
  const saved = localStorage.getItem('gemini_api_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('keySaved').style.display = 'block';
  }
});

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (key) {
    localStorage.setItem('gemini_api_key', key);
    document.getElementById('keySaved').style.display = 'block';
  }
}

function toggleKey() {
  const input = document.getElementById('apiKey');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function generateScript() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const topic = document.getElementById('topic').value.trim();
  const audience = document.getElementById('audience').value;
  const tone = document.getElementById('tone').value;
  const cta = document.getElementById('cta').value;
  const context = document.getElementById('context').value.trim();

  const errEl = document.getElementById('errorMsg');

  if (!apiKey) {
    errEl.textContent = '🔑 Please enter your Gemini API key above first. Get one free at aistudio.google.com';
    errEl.style.display = 'block';
    return;
  }

  if (!topic) {
    errEl.textContent = 'Please enter a topic first.';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loader"></div> Generating...';
  document.getElementById('output').style.display = 'none';

  const prompt = `You are a viral Instagram Reel scriptwriter. Respond with ONLY a valid JSON object — no markdown fences, no extra text.

Return this exact structure:
{
  "hook": {
    "script": "The actual spoken hook line (1-2 punchy sentences)",
    "onscreen": "Bold on-screen text overlay (max 8 words)",
    "visual": "Specific visual suggestion for this scene"
  },
  "problem": {
    "script": "The relatable pain point narration (2-3 sentences)",
    "onscreen": "On-screen text for this segment",
    "visual": "Specific visual suggestion"
  },
  "value": {
    "intro": "Brief intro line before the 3 points",
    "points": [
      { "point": "Key tip 1 (punchy, one sentence)", "onscreen": "Short on-screen label", "visual": "Visual suggestion" },
      { "point": "Key tip 2 (punchy, one sentence)", "onscreen": "Short on-screen label", "visual": "Visual suggestion" },
      { "point": "Key tip 3 (punchy, one sentence)", "onscreen": "Short on-screen label", "visual": "Visual suggestion" }
    ]
  },
  "cta": {
    "script": "The engaging call-to-action line (1-2 sentences)",
    "onscreen": "On-screen CTA text",
    "visual": "Visual suggestion for outro"
  },
  "hashtags": ["tag1", "tag2", "tag3", "tag4", "tag5"],
  "duration": "Estimated reel duration e.g. 38 seconds"
}

Topic: ${topic}
Audience: ${audience}
Tone: ${tone}
CTA Goal: ${cta}
${context ? `Extra context: ${context}` : ''}

Write a 30-45 second Instagram Reel script. Make the hook genuinely scroll-stopping. Keep all copy punchy, simple, optimized for this audience.`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.8, maxOutputTokens: 1200 }
        })
      }
    );

    const data = await res.json();

    if (data.error) {
      errEl.textContent = `API Error: ${data.error.message}. Check your API key.`;
      errEl.style.display = 'block';
      return;
    }

    let raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    raw = raw.replace(/```json|```/g, '').trim();
    const script = JSON.parse(raw);
    renderScript(script, topic, audience);
  } catch (e) {
    errEl.textContent = 'Something went wrong. Check your API key and try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>✨</span> Generate Script';
  }
}

function renderScript(s, topic, audience) {
  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:0.5rem">
      <div>
        <div style="font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.2rem">Generated Script</div>
        <div style="font-weight:700;font-size:1.1rem">${topic.charAt(0).toUpperCase() + topic.slice(1)}</div>
        <div style="font-size:0.82rem;color:var(--muted)">For ${audience} · Est. ${s.duration || '35–40 sec'}</div>
      </div>
    </div>`;

  html += sectionBlock('hook', '🎣', 'Hook', '0–3 sec', s.hook.script, s.hook.onscreen, s.hook.visual);
  html += sectionBlock('problem', '😤', 'Problem', '3–10 sec', s.problem.script, s.problem.onscreen, s.problem.visual);

  html += `
  <div class="section-block value">
    <div class="section-header">
      <div class="section-icon">💡</div>
      <div class="section-title">Value — 3 Key Points</div>
      <span class="timing-tag">10–35 sec</span>
    </div>
    <div class="section-body">
      <div class="script-line">${s.value.intro}</div>
      <div class="value-points">`;

  s.value.points.forEach((p, i) => {
    html += `
      <div class="value-point">
        <div class="vp-num">${i + 1}</div>
        <div style="flex:1">
          <div class="vp-text">${p.point}</div>
          <div class="meta-grid" style="margin-top:0.6rem">
            <div class="meta-item">
              <div class="meta-label">📱 On-Screen Text</div>
              <div class="meta-value">${p.onscreen}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">🎬 Visual</div>
              <div class="meta-value">${p.visual}</div>
            </div>
          </div>
        </div>
      </div>`;
  });

  html += `</div></div></div>`;
  html += sectionBlock('cta', '📣', 'Call to Action', 'Final 5 sec', s.cta.script, s.cta.onscreen, s.cta.visual);

  if (s.hashtags?.length) {
    html += `
    <div class="section-block" style="margin-bottom:1.2rem">
      <div class="section-header">
        <div class="section-icon" style="background:#1f2d3d">#️⃣</div>
        <div class="section-title">Suggested Hashtags</div>
      </div>
      <div class="section-body">
        <div style="display:flex;flex-wrap:wrap;gap:0.5rem">
          ${s.hashtags.map(h => `<span style="background:var(--card);border:1px solid var(--border);border-radius:100px;padding:0.3rem 0.8rem;font-size:0.82rem;color:var(--accent)">#${h.replace(/^#/, '')}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }

  html += `<div class="copy-bar"><button class="copy-btn" id="copyBtn" onclick="copyScript()">📋 Copy Full Script</button></div>`;

  const out = document.getElementById('output');
  out.innerHTML = html;
  out.style.display = 'block';
  out.scrollIntoView({ behavior: 'smooth', block: 'start' });
  window._scriptText = buildPlainText(s, topic, audience);
}

function sectionBlock(cls, icon, title, timing, script, onscreen, visual) {
  return `
  <div class="section-block ${cls}">
    <div class="section-header">
      <div class="section-icon">${icon}</div>
      <div class="section-title">${title}</div>
      <span class="timing-tag">${timing}</span>
    </div>
    <div class="section-body">
      <div class="script-line">${script}</div>
      <div class="meta-grid">
        <div class="meta-item">
          <div class="meta-label">📱 On-Screen Text</div>
          <div class="meta-value">${onscreen}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">🎬 Visual Suggestion</div>
          <div class="meta-value">${visual}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildPlainText(s, topic, audience) {
  let t = `INSTAGRAM REEL SCRIPT\nTopic: ${topic} | Audience: ${audience}\n\n`;
  t += `🎣 HOOK (0–3 sec)\n${s.hook.script}\nOn-Screen: ${s.hook.onscreen}\nVisual: ${s.hook.visual}\n\n`;
  t += `😤 PROBLEM (3–10 sec)\n${s.problem.script}\nOn-Screen: ${s.problem.onscreen}\nVisual: ${s.problem.visual}\n\n`;
  t += `💡 VALUE (10–35 sec)\n${s.value.intro}\n`;
  s.value.points.forEach((p, i) => { t += `${i+1}. ${p.point}\n   On-Screen: ${p.onscreen} | Visual: ${p.visual}\n`; });
  t += `\n📣 CTA\n${s.cta.script}\nOn-Screen: ${s.cta.onscreen}\nVisual: ${s.cta.visual}\n\n`;
  if (s.hashtags?.length) t += `Hashtags: ${s.hashtags.map(h=>'#'+h.replace(/^#/,'')).join(' ')}\n`;
  return t;
}

function copyScript() {
  const btn = document.getElementById('copyBtn');
  const text = window._scriptText || '';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showCopied(btn)).catch(() => fallbackCopy(text, btn));
  } else { fallbackCopy(text, btn); }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); showCopied(btn); }
  catch { window.prompt('Press Ctrl+C / Cmd+C to copy:', text); }
  document.body.removeChild(ta);
}

function showCopied(btn) {
  btn.classList.add('copied');
  btn.textContent = '✅ Copied!';
  setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '📋 Copy Full Script'; }, 2500);
}

document.getElementById('topic').addEventListener('keydown', e => { if (e.key === 'Enter') generateScript(); });
</script>
</body>
</html>
